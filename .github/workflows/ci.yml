name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint informatif — n'échoue pas la CI (erreurs héritées connues).
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Build de production — c'est le vrai gate (esbuild/Vite).
      # Fonctionne sans clés Supabase (mode démo au build).
      - name: Build
        run: npm run build
